host: "prodethan.com"
stripe:
  public_key: "<%= Rails.application.credentials.dig(:stripe, :public_key) %>"
  secret_key: "<%= Rails.application.credentials.dig(:stripe, :secret_key) %>"
  payments_webhook_secret: "<%= Rails.application.credentials.dig(:stripe, :payments_webhook_secret) %>"
oauth2:
  google:
    client_id: "<%= Rails.application.credentials.dig(:oauth2, :google, :client_id) %>"
    client_secret: "<%= Rails.application.credentials.dig(:oauth2, :google, :client_secret) %>"

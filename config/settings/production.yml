host: "prodethan.com"
stripe:
  public_key: "<%= Rails.application.credentials.fetch(:stripe).fetch(:public_key) %>"
  secret_key: "<%= Rails.application.credentials.fetch(:stripe).fetch(:secret_key) %>"
  payments_webhook_secret: "<%= Rails.application.credentials.fetch(:stripe).fetch(:payments_webhook_secret) %>"
oauth2:
  google:
    client_id: "<%= Rails.application.credentials.fetch(:oauth2).fetch(:google).(:client_id) %>"
    client_secret: "<%= Rails.application.credentials.fetch(:oauth2).fetch(:google).fetch(:client_secret) %>"
